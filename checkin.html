<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเช็คอินหน้างาน - หนูน้อยสงกรานต์วิสุทธิกษัตริย์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary-color: #2980b9; --primary-hover: #2471a3; --bg-color: #ecf0f1; }
        
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #333; 
            padding: 10px;
            margin: 0; 
            transition: background 0.5s;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .banner-img { width: 100%; height: 150px; object-fit: cover; display: none; border-bottom: 5px solid var(--primary-color); }

        .form-body { padding: 20px; }
        h1 { text-align: center; color: var(--primary-color); margin-top: 0; border-bottom: 2px dashed #bdc3c7; padding-bottom: 15px; font-size: 22px; }
        
        #loginArea { display: flex; flex-direction: column; gap: 15px; padding: 20px 0; animation: fadeIn 0.4s; }
        .login-input { padding: 15px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 8px; font-family: 'Prompt'; outline: none; width: 100%; box-sizing: border-box; }
        .login-input:focus { border-color: var(--primary-color); }
        .btn-login { background: var(--primary-color); color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 600; width: 100%; }

        #mainAppArea { display: none; animation: fadeIn 0.4s; }

        .search-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .search-box input { padding: 15px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 8px; font-family: 'Prompt'; outline: none; width: 100%; box-sizing: border-box; }
        .search-box input:focus { border-color: var(--primary-color); }
        .btn-search { background: var(--primary-color); color: white; border: none; padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 600; width: 100%; }
        
        .btn-show-all { background: #34495e; color: white; border: none; padding: 12px; font-size: 14px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 500; width: 100%; margin-bottom: 20px; }

        .result-item { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: 0.2s; }
        .result-item:hover { border-color: var(--primary-color); background: #eaf2f8; }
        .result-info h4 { margin: 0; color: #2c3e50; font-size: 16px; }
        .result-info p { margin: 5px 0 0 0; font-size: 13px; color: #7f8c8d; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; text-align: center; display: inline-block; }
        .status-waiting { background: #f1c40f; color: #8a6d3b; }
        .status-checked { background: #2ecc71; color: white; }

        #checkInArea { display: none; background: #fff; border: 2px solid var(--primary-color); padding: 20px; border-radius: 12px; margin-top: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        
        .checkin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .checkin-header h2 { margin: 0; color: #2c3e50; font-size: 18px; }
        .btn-close { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: 'Prompt'; font-size: 12px;}

        .info-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .info-box { background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        .info-box label { font-size: 12px; color: #7f8c8d; font-weight: bold; display: block; margin-bottom: 2px; }
        .info-box p { margin: 0; font-size: 16px; font-weight: 500; color: #333; }

        .image-gallery { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; align-items: center; }
        .img-card { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; width: 100%; box-sizing: border-box; }
        .img-card img { max-width: 100%; max-height: 250px; object-fit: contain; border-radius: 6px; cursor: pointer; border: 1px solid #eee; }
        
        .verification-box { background: #eaf8e6; padding: 15px; border-radius: 8px; border: 2px dashed #2ecc71; margin-bottom: 20px; }
        .checkbox-row { display: flex; align-items: center; margin-bottom: 15px; font-size: 15px; font-weight: 500; }
        .checkbox-row input { width: 25px; height: 25px; margin-right: 15px; cursor: pointer; }
        
        .number-input-group { margin-top: 15px; }
        .number-input-group label { display: block; font-size: 16px; font-weight: bold; color: #27ae60; margin-bottom: 8px; }
        .number-input-group input { width: 100%; padding: 15px; font-size: 22px; text-align: center; border: 2px solid #27ae60; border-radius: 8px; color: #27ae60; font-weight: bold; outline: none; box-sizing: border-box; }
        
        .btn-save { width: 100%; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; font-family: 'Prompt'; transition: 0.2s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-save:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; color: #7f8c8d; }
        
        .btn-reset { width: 100%; background: #fff; color: #e74c3c; border: 2px solid #e74c3c; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 10px; font-family: 'Prompt'; }

        .admin-panel { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .stats-text { font-size: 15px; color: #555; background: #f1f2f6; padding: 15px; border-radius: 8px; margin-bottom: 5px;}
        
        /* สไตล์ปุ่ม Admin */
        .btn-action { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-weight: 500; width: 100%; font-size: 16px; }
        .bg-export { background: #8e44ad; }
        .bg-checkin-all { background: #27ae60; }
        .bg-delete-all { background: #e74c3c; }
        .bg-logout { background: #7f8c8d; margin-top: 15px; }

        #imgModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        #imgModal img { max-width: 95%; max-height: 90%; border-radius: 8px; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        #loadingOverlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px); }
        .loader-spin { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="loader-spin"></div>
    <p style="margin-top:15px; font-family:'Prompt'; font-weight:500; color:var(--primary-color);" id="loadingText">กำลังเตรียมระบบ...</p>
</div>

<div class="container">
    <img id="bannerDisplay" src="" class="banner-img">
    
    <div class="form-body">
        <h1>📱 เช็คอินรายงานตัวหน้างาน</h1>
        
        <div id="loginArea">
            <p style="text-align:center; color:#555; font-size:14px; margin:0;">กรุณาเข้าสู่ระบบด้วยรหัสผู้ดูแล</p>
            <input type="text" id="loginUser" class="login-input" placeholder="ชื่อผู้ใช้ (Username)">
            <input type="password" id="loginPass" class="login-input" placeholder="รหัสผ่าน (Password)" onkeypress="if(event.key === 'Enter') processLogin()">
            <button class="btn-login" onclick="processLogin()">เข้าสู่ระบบ</button>
        </div>

        <div id="mainAppArea">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อน้อง หรือ รหัส SK-..." onkeypress="if(event.key === 'Enter') searchData()">
                <button class="btn-search" onclick="searchData()">🔍 ค้นหา</button>
            </div>
            
            <button class="btn-show-all" onclick="showAllData()">📋 แสดงรายชื่อผู้สมัครทั้งหมด</button>

            <div id="searchResultList"></div>

            <div id="checkInArea">
                <div class="checkin-header">
                    <h2 id="checkInTitle">📌 รายงานตัว</h2>
                    <button class="btn-close" onclick="closeCheckIn()">ปิด ✖</button>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <label>รหัสผู้สมัคร</label>
                        <p id="ci_appId" style="color: #e74c3c; font-weight: bold; font-size: 16px;">-</p>
                    </div>
                    <div class="info-box">
                        <label>ชื่อ-นามสกุล</label>
                        <p id="ci_name" style="color: #2980b9; font-weight: bold; font-size: 16px;">-</p>
                    </div>
                </div>

                <h3 style="font-size: 15px; color: #444; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px;">📸 รูปภาพเอกสาร</h3>
                <div class="image-gallery" id="ci_images"></div>

                <div class="verification-box">
                    <div class="checkbox-row">
                        <input type="checkbox" id="chkPhoto" onchange="validateForm()">
                        <label for="chkPhoto">รูปถ่ายหน้าตรง ถูกต้อง ✅</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="chkIdCard" onchange="validateForm()">
                        <label for="chkIdCard">บัตรประชาชน/สูติบัตร ถูกต้อง ✅</label>
                    </div>

                    <div class="number-input-group">
                        <label>🎖️ ระบุหมายเลขผู้เข้าประกวด:</label>
                        <input type="text" id="ci_contestNumber" placeholder="เช่น 01 หรือ A15" oninput="validateForm()">
                    </div>
                </div>

                <button class="btn-save" id="btnSaveCheckin" onclick="saveCheckIn()" disabled>💾 บันทึกการรายงานตัว</button>
                <button class="btn-reset" id="btnResetCheckin" onclick="resetCheckIn()" style="display:none;">⚠️ ยกเลิกการรายงานตัว (ล้างข้อมูล)</button>
            </div>

            <div class="admin-panel">
                <div class="stats-text">
                    <strong>📊 สถิติหน้างาน:</strong><br>
                    รายงานตัวแล้ว <span id="statCheckedIn" style="font-weight:bold; color:#27ae60; font-size:22px;">0</span> / 
                    <span id="statTotal" style="font-size:18px;">0</span> คน
                </div>
                
                <button class="btn-action bg-export" onclick="exportCheckInCSV()">📥 Export รายงานตัว (CSV)</button>
                <button class="btn-action bg-checkin-all" onclick="checkInAllData()">✅ รายงานตัวให้ทุกคน (รันเบอร์อัตโนมัติ)</button>
                <button class="btn-action bg-delete-all" onclick="clearAllCheckinData()">🗑️ ล้างข้อมูลการเช็คอินทั้งหมด (เริ่มใหม่)</button>
                
                <button class="btn-action bg-logout" onclick="processLogout()">🚪 ออกจากระบบ</button>
            </div>
        </div>
    </div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <p style="color:white; position:absolute; bottom:30px; font-size:14px; background:rgba(0,0,0,0.5); padding:8px 20px; border-radius:20px;">คลิกที่ใดก็ได้เพื่อปิด</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC4VAfcbDDrDjOZVAIV3cYCcVa2F0re6j8",
        authDomain: "register-wisutikasat.firebaseapp.com",
        projectId: "register-wisutikasat",
        messagingSenderId: "572965765143",
        appId: "1:572965765143:web:534acca9ea1a54ff939c52"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let adminUsers = [];
    let allSubmissions = [];
    let questionsConfig = []; 
    let currentCheckInId = "";

    const SESSION_DURATION = 60 * 60 * 1000; 

    async function initApp() {
        document.getElementById('loadingText').innerText = "กำลังเชื่อมต่อระบบ...";
        try {
            const adminsDoc = await db.collection("settings").doc("admins").get();
            if (adminsDoc.exists) adminUsers = adminsDoc.data().users || [];

            const themeDoc = await db.collection("settings").doc("theme").get();
            if (themeDoc.exists) {
                const theme = themeDoc.data();
                if(theme.bannerUrl) { document.getElementById('bannerDisplay').src = theme.bannerUrl; document.getElementById('bannerDisplay').style.display = 'block'; }
                if(theme.backgroundUrl) document.body.style.backgroundImage = `url('${theme.backgroundUrl}')`;
            }
            checkSession();
        } catch (error) { 
            alert("โหลดข้อมูลขัดข้อง: " + error.message); 
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function checkSession() {
        const sessionTime = localStorage.getItem('checkin_login_time');
        const now = new Date().getTime();

        if (sessionTime && (now - parseInt(sessionTime)) < SESSION_DURATION) {
            showMainApp();
        } else {
            localStorage.removeItem('checkin_login_time');
            document.getElementById('loginArea').style.display = 'flex';
            document.getElementById('mainAppArea').style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    async function processLogin() {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();
        
        if(!u || !p) { alert("กรุณากรอกข้อมูลให้ครบ"); return; }

        const foundUser = adminUsers.find(user => user.username === u && user.password === p);
        if (foundUser) {
            localStorage.setItem('checkin_login_time', new Date().getTime().toString());
            showMainApp();
        } else { 
            alert("❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!"); 
        }
    }

    function processLogout() {
        localStorage.removeItem('checkin_login_time');
        location.reload(); 
    }

    async function showMainApp() {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('mainAppArea').style.display = 'block';
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').innerText = "กำลังดึงข้อมูลผู้สมัคร...";
        
        const formDoc = await db.collection("settings").doc("form").get();
        if (formDoc.exists) questionsConfig = formDoc.data().questions || [];

        await fetchSubmissions();
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function fetchSubmissions() {
        const snap = await db.collection("submissions").orderBy("timestamp", "desc").get();
        allSubmissions = snap.docs.map(doc => doc.data());
        updateStats();
    }

    function extractName(answersObj) {
        let extractedName = "ไม่พบชื่อผู้สมัคร";
        for (let q of questionsConfig) {
            if (q.label.toLowerCase().includes('ชื่อ') || q.label.toLowerCase().includes('name')) {
                if (answersObj[q.id] && answersObj[q.id] !== "-") return answersObj[q.id];
            }
        }
        for (let key in answersObj) {
            let val = answersObj[key];
            if (typeof val === 'string' && val.length > 2 && !val.includes('http') && !val.startsWith('data:image')) return val;
        }
        return extractedName;
    }

    function showAllData() {
        document.getElementById('searchInput').value = ""; 
        renderResultList(allSubmissions); 
    }

    function searchData() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!keyword) return;

        const results = allSubmissions.filter(sub => {
            if(sub.appId.toLowerCase().includes(keyword)) return true;
            const exactName = extractName(sub.answers).toLowerCase();
            if (exactName.includes(keyword)) return true;
            return false;
        });

        renderResultList(results);
    }

    function renderResultList(resultsArray) {
        const resultList = document.getElementById('searchResultList');
        resultList.innerHTML = "";
        document.getElementById('checkInArea').style.display = 'none';

        if(resultsArray.length === 0) {
            resultList.innerHTML = `
                <div style="background:#fdedec; border:1px solid #e74c3c; padding:15px; border-radius:8px; text-align:center;">
                    <p style="color:#c0392b; margin:0; font-weight:bold;">❌ ไม่พบข้อมูล</p>
                </div>`;
            return;
        }

        resultsArray.forEach(sub => {
            const exactName = extractName(sub.answers);
            const isDone = sub.checkinData && sub.checkinData.status === true;
            const badge = isDone 
                ? `<span class="status-badge status-checked">✅ เบอร์ ${sub.checkinData.contestNumber}</span>` 
                : `<span class="status-badge status-waiting">⏳ รอรายงานตัว</span>`;
            
            const div = document.createElement('div');
            div.className = "result-item";
            div.innerHTML = `
                <div class="result-info">
                    <h4>${exactName}</h4>
                    <p>รหัส: <strong style="color:#e74c3c;">${sub.appId}</strong></p>
                </div>
                <div>${badge}</div>
            `;
            div.onclick = () => openCheckIn(sub, exactName);
            resultList.appendChild(div);
        });
    }

    function openCheckIn(sub, exactName) {
        currentCheckInId = sub.appId;
        document.getElementById('ci_appId').innerText = sub.appId;
        document.getElementById('ci_name').innerText = exactName;
        
        document.getElementById('chkPhoto').checked = false;
        document.getElementById('chkIdCard').checked = false;
        document.getElementById('ci_contestNumber').value = "";
        
        const isDone = sub.checkinData && sub.checkinData.status === true;
        
        if(isDone) {
            document.getElementById('chkPhoto').checked = sub.checkinData.verifiedPhoto;
            document.getElementById('chkIdCard').checked = sub.checkinData.verifiedIdCard;
            document.getElementById('ci_contestNumber').value = sub.checkinData.contestNumber;
            document.getElementById('btnResetCheckin').style.display = 'block';
            document.getElementById('checkInTitle').innerHTML = "✏️ แก้ไขข้อมูลรายงานตัว";
            document.getElementById('btnSaveCheckin').innerText = "💾 อัปเดตข้อมูล";
        } else {
            document.getElementById('btnResetCheckin').style.display = 'none';
            document.getElementById('checkInTitle').innerHTML = "📌 รายงานตัวใหม่";
            document.getElementById('btnSaveCheckin').innerText = "💾 บันทึกการรายงานตัว";
        }

        const gallery = document.getElementById('ci_images');
        gallery.innerHTML = "";
        let imgCount = 0;

        for (let key in sub.answers) {
            let val = sub.answers[key];
            if (val && typeof val === 'string' && (val.includes('res.cloudinary.com') || val.includes('i.ibb.co') || val.startsWith('data:image'))) {
                imgCount++;
                let labelText = "เอกสาร/รูปภาพ " + imgCount;
                const foundQuestion = questionsConfig.find(q => q.id === key);
                if (foundQuestion) labelText = foundQuestion.label;

                gallery.innerHTML += `
                    <div class="img-card">
                        <img src="${val}" onclick="zoomImg('${val}')" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Error'">
                        <span style="font-size:12px; color:#555; display:block; font-weight:bold; margin-top:5px;">${labelText}</span>
                        <span style="font-size:10px; color:#999;">🔍 คลิกรูปเพื่อขยาย</span>
                    </div>
                `;
            }
        }

        if (imgCount === 0) {
            gallery.innerHTML = "<p style='color:#e74c3c; font-size:14px; width:100%; text-align:center;'>⚠️ ไม่พบรูปภาพแนบมาในระบบ</p>";
        }
        
        validateForm();
        
        document.getElementById('searchResultList').innerHTML = "";
        const checkInBox = document.getElementById('checkInArea');
        checkInBox.style.display = 'block';
        checkInBox.scrollIntoView({ behavior: 'smooth' });
    }

    function closeCheckIn() { 
        document.getElementById('checkInArea').style.display = 'none'; 
        document.getElementById('searchInput').value = "";
    }
    
    function zoomImg(url) { 
        document.getElementById('modalImg').src = url; 
        document.getElementById('imgModal').style.display = 'flex'; 
    }

    function validateForm() {
        const c1 = document.getElementById('chkPhoto').checked;
        const c2 = document.getElementById('chkIdCard').checked;
        const num = document.getElementById('ci_contestNumber').value.trim();
        document.getElementById('btnSaveCheckin').disabled = !(c1 && c2 && num !== "");
    }

    async function saveCheckIn() {
        const btn = document.getElementById('btnSaveCheckin');
        btn.disabled = true; 
        btn.innerHTML = "กำลังบันทึก... ⏳";

        const checkinData = {
            status: true,
            contestNumber: document.getElementById('ci_contestNumber').value.trim(),
            checkInTime: new Date().toLocaleString('th-TH'),
            verifiedPhoto: document.getElementById('chkPhoto').checked,
            verifiedIdCard: document.getElementById('chkIdCard').checked
        };

        try {
            await db.collection("submissions").doc(currentCheckInId).set({ checkinData: checkinData }, { merge: true });
            alert("✅ บันทึกหมายเลข " + checkinData.contestNumber + " สำเร็จ!");
            await fetchSubmissions();
            closeCheckIn();
        } catch(e) { 
            alert("ล้มเหลว: " + e.message); 
            btn.disabled = false; 
            btn.innerHTML = "💾 บันทึกการรายงานตัว";
        }
    }

    // 🌟 ระบบ "รายงานตัวทุกคน" (Auto Check-in)
    async function checkInAllData() {
        if(!confirm("⚠️ คำเตือน: คุณต้องการ 'รายงานตัวให้ผู้สมัครทุกคน' ใช่หรือไม่?\n\n(ระบบจะสุ่มรันหมายเลขประกวดให้ทุกคนอัตโนมัติ)")) return;
        
        const confirmText = prompt("พิมพ์คำว่า 'ยืนยัน' เพื่อดำเนินการรายงานตัวทุกคน:");
        if (confirmText !== "ยืนยัน") {
            alert("❌ ยกเลิกการทำรายการ");
            return;
        }

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').innerText = "กำลังรายงานตัวให้ทุกคน...";

        try {
            // เรียงลำดับผู้สมัครตาม appId เพื่อรันเบอร์ให้สวยงาม
            let sortedSubs = [...allSubmissions];
            sortedSubs.sort((a, b) => a.appId.localeCompare(b.appId));

            let promises = [];
            let counter = 1;

            sortedSubs.forEach(sub => {
                // รันเบอร์ 01, 02, 03...
                let contestNum = counter < 10 ? "0" + counter : "" + counter;
                counter++;

                const checkinData = {
                    status: true,
                    contestNumber: contestNum,
                    checkInTime: new Date().toLocaleString('th-TH'),
                    verifiedPhoto: true,
                    verifiedIdCard: true
                };

                promises.push(db.collection("submissions").doc(sub.appId).set({
                    checkinData: checkinData
                }, { merge: true }));
            });

            await Promise.all(promises);

            alert("✅ รายงานตัวให้ผู้สมัครทุกคน และรันหมายเลขสำเร็จ!");
            await fetchSubmissions();
            closeCheckIn();
        } catch(e) { 
            alert("เกิดข้อผิดพลาด: " + e.message); 
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function resetCheckIn() {
        if(!confirm("⚠️ ยืนยันการล้างข้อมูลเช็คอินของคนนี้ใช่หรือไม่?")) return;
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').innerText = "กำลังยกเลิกการรายงานตัว...";

        try {
            await db.collection("submissions").doc(currentCheckInId).update({
                checkinData: firebase.firestore.FieldValue.delete()
            });
            alert("🗑️ ล้างข้อมูลการรายงานตัวเรียบร้อยแล้ว");
            await fetchSubmissions();
            closeCheckIn();
        } catch(e) { alert("Error: " + e.message); }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function clearAllCheckinData() {
        if(!confirm("⚠️ คำเตือน: คุณต้องการ 'ล้างข้อมูลการเช็คอิน' ของผู้สมัครทุกคนใช่หรือไม่?")) return;
        
        const confirmText = prompt("พิมพ์คำว่า 'ยืนยัน' ด้านล่างเพื่อล้างข้อมูลเช็คอินทั้งหมด:");
        if (confirmText === "ยืนยัน") {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').innerText = "กำลังล้างข้อมูลเช็คอินทั้งหมด...";
            
            try {
                const snapshot = await db.collection("submissions").get();
                const deletePromises = snapshot.docs.map(doc => {
                    return doc.ref.update({
                        checkinData: firebase.firestore.FieldValue.delete()
                    });
                });
                await Promise.all(deletePromises);
                
                alert("✅ ล้างข้อมูลการเช็คอินทั้งหมดเรียบร้อยแล้ว! (ทุกคนกลับไปสถานะรอรายงานตัว)");
                await fetchSubmissions(); 
                closeCheckIn();
            } catch(e) { 
                alert("เกิดข้อผิดพลาด: " + e.message); 
            }
            document.getElementById('loadingOverlay').style.display = 'none';
        } else if (confirmText !== null) {
            alert("❌ ยกเลิกการล้างข้อมูล (พิมพ์ไม่ถูกต้อง)");
        }
    }

    function updateStats() {
        document.getElementById('statTotal').innerText = allSubmissions.length;
        document.getElementById('statCheckedIn').innerText = allSubmissions.filter(sub => sub.checkinData && sub.checkinData.status === true).length;
    }

    function exportCheckInCSV() {
        const checkedInUsers = allSubmissions.filter(sub => sub.checkinData && sub.checkinData.status === true);
        if(checkedInUsers.length === 0) { alert("ยังไม่มีผู้สมัครมารายงานตัวหน้างานครับ"); return; }
        
        checkedInUsers.sort((a, b) => a.checkinData.contestNumber.localeCompare(b.checkinData.contestNumber, undefined, {numeric: true}));
        
        let csv = "หมายเลขประกวด,ชื่อ-นามสกุล,รหัสอ้างอิง,เวลาเช็คอิน\n";
        checkedInUsers.forEach(sub => {
            const exactName = extractName(sub.answers);
            csv += `"${sub.checkinData.contestNumber}","${exactName}","${sub.appId}","${sub.checkinData.checkInTime}"\n`;
        });

        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `รายงานตัว_หน้างาน_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.csv`;
        link.click();
    }

    initApp();
</script>
