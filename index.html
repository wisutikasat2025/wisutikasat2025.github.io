<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัคร - หนูน้อยสงกรานต์วิสุทธิกษัตริย์ ๒๕๖๙</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary-color: #6a1b9a; --primary-hover: #4a148c; --bg-color: #f3e5f5; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-color); background-size: cover; background-attachment: fixed; background-position: center; color: #333; padding: 20px; margin: 0; transition: background 0.5s; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; position: relative; min-height: 400px; }
        .banner-img { width: 100%; height: 250px; object-fit: cover; display: block; border-bottom: 5px solid var(--primary-color); }
        .form-body { padding: 30px; }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 25px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #eee; }
        .section-header { background-color: var(--primary-color); color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .section-header h3 { margin: 0; font-size: 18px; }
        label { display: block; font-weight: 600; font-size: 16px; margin-bottom: 5px; color: #2c3e50; }
        .question-desc { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
        .question-img { max-width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .required-star { color: red; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Prompt'; }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-submit { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; font-family: 'Prompt'; }
        .btn-back { background-color: #95a5a6; flex: 1; }
        .admin-toggle-btn { position: absolute; top: 15px; right: 15px; background: white; border: none; font-size: 20px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        .admin-tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 6px; font-family: 'Prompt'; font-size: 12px; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .edit-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .options-container { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #loadingOverlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="loader"></div>
    <p style="font-family:'Prompt'; margin-top:15px;">กำลังโหลดระบบรับสมัคร...</p>
</div>

<div class="modal-overlay" id="loginModal">
    <div class="login-box">
        <h3 style="font-family:'Prompt'; color:var(--primary-color);">🔒 แอดมินล็อกอิน</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password" style="margin-top:10px;">
        <button class="btn-submit" style="font-size:16px;" onclick="processLogin()">เข้าสู่ระบบ</button>
        <button onclick="closeLogin()" style="margin-top:10px; background:none; border:none; cursor:pointer; font-family:'Prompt'; color:gray;">ยกเลิก</button>
    </div>
</div>

<div class="container" id="mainContainer" style="display:none;">
    <button class="admin-toggle-btn" id="gearBtn" onclick="openLogin()">⚙️</button>
    <img id="bannerImage" src="" class="banner-img" style="display:none;">

    <div class="form-body">
        <div class="admin-tabs" id="adminTabsMenu" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('tab-form')">📝 จัดการฟอร์ม</button>
            <button class="tab-btn" onclick="switchTab('tab-stats')">📊 สถิติ/รายชื่อ</button>
            <button class="tab-btn" onclick="switchTab('tab-settings')">🎨 ตั้งค่า</button>
            <button class="tab-btn" style="background:#e74c3c; color:#fff;" onclick="logout()">ออก</button>
        </div>

        <div id="tab-stats" class="tab-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="tab-btn active" onclick="renderStatsView('summary')">ภาพรวม</button>
                <button class="tab-btn" onclick="renderStatsView('individual')">รายคน</button>
            </div>
            <div id="statsContentArea"></div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="form-group">
                <label>อัปโหลดหน้าปกเว็บ (Banner):</label>
                <input type="file" accept="image/*" onchange="uploadThemeImage(this, 'banner')">
                <label style="margin-top:15px;">อัปโหลดพื้นหลัง (Background):</label>
                <input type="file" accept="image/*" onchange="uploadThemeImage(this, 'bg')">
            </div>
        </div>

        <div id="tab-form" class="tab-content active">
            <h2 id="formTitle">🌸 รับสมัครหนูน้อยสงกรานต์วิสุทธิกษัตริย์ ๒๕๖๙</h2>
            <form id="dynamicForm"><div id="form-content"></div></form>
            <div id="adminFormControls" style="display:none; text-align:center;">
                <button class="btn-submit" style="background:#2ecc71;" onclick="addNewQuestion()">+ เพิ่มคำถาม / คำชี้แจง</button>
                <button class="btn-submit" id="saveFormBtn" onclick="saveAdminChanges()">💾 บันทึกโครงสร้างฟอร์ม</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. ใส่ Config ของครูไอซ์
    const firebaseConfig = {
        apiKey: "AIzaSyC4VAfcbDDrDjOZVAIV3cYCcVa2F0re6j8",
        authDomain: "register-wisutikasat.firebaseapp.com",
        projectId: "register-wisutikasat",
        storageBucket: "register-wisutikasat.firebasestorage.app",
        messagingSenderId: "572965765143",
        appId: "1:572965765143:web:534acca9ea1a54ff939c52"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let isAdminMode = false;
    let currentFormPage = 0;
    let questionsData = [];
    let submissions = [];
    let themeSettings = { bannerUrl: "", backgroundUrl: "" };

    // 2. โหลดข้อมูลตอนเข้าเว็บ
    async function loadInitialData() {
        try {
            const themeDoc = await db.collection("settings").doc("theme").get();
            if (themeDoc.exists) themeSettings = themeDoc.data();
            
            const formDoc = await db.collection("settings").doc("form").get();
            if (formDoc.exists) {
                questionsData = formDoc.data().questions || [];
            } else {
                // ข้อมูลตั้งต้นถ้ายังไม่เคยสร้างฟอร์ม
                questionsData = [
                    { id: "s_01", label: "📋 คำชี้แจง", type: "section", description: "กรุณากรอกข้อมูลให้ครบถ้วน", isRequired: false, options: [], imageUrl: "" },
                    { id: "q_name", label: "ชื่อ-นามสกุล", type: "text", description: "", isRequired: true, options: [], imageUrl: "" },
                    { id: "q_pic", label: "อัปโหลดรูปถ่าย", type: "file", description: "ไฟล์รูปภาพไม่เกิน 10MB", isRequired: true, options: [], imageUrl: "" }
                ];
            }
            applyTheme();
            renderForm();
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        } catch (e) { 
            console.error(e); 
            document.getElementById('loadingOverlay').innerHTML = `<h3 style='color:red;'>⚠️ โหลดข้อมูลไม่สำเร็จ</h3><p>${e.message}</p>`;
        }
    }

    // ระบบ Login
    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
    function processLogin() {
        if(document.getElementById('loginUser').value === "ADMIN" && document.getElementById('loginPass').value === "1234") {
            isAdminMode = true; closeLogin();
            document.getElementById('adminTabsMenu').style.display = 'flex';
            document.getElementById('gearBtn').style.display = 'none';
            document.getElementById('formTitle').style.display = 'none';
            renderForm();
        } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
    }
    function logout() { location.reload(); }

    async function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'tab-stats') {
            document.getElementById('statsContentArea').innerHTML = "กำลังโหลดข้อมูล...";
            try {
                const snap = await db.collection("submissions").orderBy("timestamp", "desc").get();
                submissions = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderStatsView('summary');
            } catch(e) { alert("โหลดสถิติไม่ได้: " + e.message); }
        }
    }

    function uploadThemeImage(input, type) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(type === 'banner') themeSettings.bannerUrl = e.target.result;
            else themeSettings.backgroundUrl = e.target.result;
            applyTheme();
        };
        reader.readAsDataURL(input.files[0]);
    }
    
    function applyTheme() {
        if(themeSettings.bannerUrl) { document.getElementById('bannerImage').src = themeSettings.bannerUrl; document.getElementById('bannerImage').style.display = 'block'; }
        if(themeSettings.backgroundUrl) document.body.style.backgroundImage = `url('${themeSettings.backgroundUrl}')`;
    }

    // วาดฟอร์ม
    function renderForm() {
        const content = document.getElementById('form-content');
        content.innerHTML = '';
        if(isAdminMode) {
            questionsData.forEach((q, i) => {
                const div = document.createElement('div'); div.className = 'form-group';
                if(q.type === 'section') div.style.border = '2px solid #1abc9c';
                div.innerHTML = `
                    <input type="text" id="edit_label_${i}" value="${q.label}" style="font-weight:bold;" placeholder="หัวข้อคำถาม / คำชี้แจง">
                    <textarea id="edit_desc_${i}" style="margin-top:5px;" placeholder="คำอธิบายเพิ่มเติม">${q.description}</textarea>
                    <div class="edit-row" style="margin-top:10px;">
                        <select id="edit_type_${i}" onchange="saveCurrentInputState();renderForm()">
                            <option value="section" ${q.type==='section'?'selected':''}>📋 แบ่งหน้า / ส่วนคำชี้แจง</option>
                            <option value="text" ${q.type==='text'?'selected':''}>ข้อความสั้น</option>
                            <option value="dropdown" ${q.type==='dropdown'?'selected':''}>ตัวเลือกเลื่อนลง (Dropdown)</option>
                            <option value="file" ${q.type==='file'?'selected':''}>อัปโหลดไฟล์รูปภาพ</option>
                        </select>
                        <select id="edit_req_${i}" ${q.type==='section'?'style="display:none;"':''}>
                            <option value="true" ${q.isRequired ? 'selected' : ''}>บังคับตอบ (*)</option>
                            <option value="false" ${!q.isRequired ? 'selected' : ''}>ไม่บังคับ</option>
                        </select>
                        <button type="button" onclick="questionsData.splice(${i},1);renderForm()" style="background:red; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">ลบ</button>
                    </div>
                    ${(q.type==='dropdown') ? `<div class="options-container" style="margin-top:10px;"><label style="font-size:12px; color:gray;">ใส่ตัวเลือก คั่นด้วยลูกน้ำ ( , )</label><textarea id="edit_opt_${i}">${q.options.join(',')}</textarea></div>` : ''}
                `;
                content.appendChild(div);
            });
            document.getElementById('adminFormControls').style.display = 'block';
        } else {
            // ระบบผู้ใช้ทั่วไป (แบ่งหน้า)
            let pages = []; let temp = [];
            questionsData.forEach(q => { if(q.type==='section' && temp.length>0) { pages.push(temp); temp=[]; } temp.push(q); });
            if(temp.length>0) pages.push(temp);

            if(pages.length === 0) { content.innerHTML = '<p style="text-align:center;">ยังไม่มีข้อมูลฟอร์ม</p>'; return; }

            pages[currentFormPage].forEach(q => {
                const div = document.createElement('div'); div.className = 'form-group';
                if(q.type === 'section') {
                    div.innerHTML = `<div class="section-header"><h3>${q.label}</h3><p>${q.description}</p></div>`;
                    div.style.background = 'none'; div.style.border = 'none'; div.style.padding = '0';
                } else {
                    div.innerHTML = `<label>${q.label} ${q.isRequired?'<span class="required-star">*</span>':''}</label><p class="question-desc">${q.description}</p>`;
                    if(q.type === 'dropdown') div.innerHTML += `<select name="${q.id}" ${q.isRequired?'required':''}><option value="">-- เลือก --</option>${q.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
                    else if(q.type === 'file') div.innerHTML += `<input type="file" name="${q.id}" accept="image/*" ${q.isRequired?'required':''}>`;
                    else div.innerHTML += `<input type="text" name="${q.id}" ${q.isRequired?'required':''}>`;
                }
                content.appendChild(div);
            });

            const nav = document.createElement('div'); nav.style.display='flex'; nav.style.gap='10px';
            if(currentFormPage > 0) nav.innerHTML += `<button type="button" class="btn-submit btn-back" onclick="changeFormPage(${currentFormPage - 1})">ย้อนกลับ</button>`;
            if(currentFormPage < pages.length - 1) nav.innerHTML += `<button type="button" class="btn-submit" onclick="changeFormPage(${currentFormPage + 1})">ถัดไป</button>`;
            else nav.innerHTML += `<button type="button" class="btn-submit" onclick="submitForm()">ส่งใบสมัคร 💾</button>`;
            content.appendChild(nav);
        }
    }

    function changeFormPage(targetPage) {
        if(targetPage > currentFormPage) {
            const inputs = document.getElementById('form-content').querySelectorAll('input, select');
            for(let input of inputs) { if(!input.checkValidity()) { input.reportValidity(); return; } }
        }
        currentFormPage = targetPage; renderForm(); window.scrollTo(0,0);
    }

    function saveCurrentInputState() {
        questionsData.forEach((q, i) => {
            if(document.getElementById(`edit_label_${i}`)) {
                q.label = document.getElementById(`edit_label_${i}`).value;
                q.description = document.getElementById(`edit_desc_${i}`).value;
                q.type = document.getElementById(`edit_type_${i}`).value;
                if(document.getElementById(`edit_req_${i}`)) q.isRequired = document.getElementById(`edit_req_${i}`).value === "true";
                if(q.type === 'dropdown') q.options = document.getElementById(`edit_opt_${i}`).value.split(',').map(o=>o.trim());
            }
        });
    }

    function addNewQuestion() {
        saveCurrentInputState();
        questionsData.push({ id: "q_"+Date.now(), label: "คำถามใหม่", type: "text", description: "", options: [], imageUrl: "", isRequired: true });
        renderForm();
    }

    // เซฟโครงสร้างคำถาม (ฝั่งแอดมิน)
    async function saveAdminChanges() {
        saveCurrentInputState();
        const btn = document.getElementById('saveFormBtn'); 
        btn.disabled = true; btn.innerHTML = "กำลังบันทึก... ⏳";
        try {
            await db.collection("settings").doc("theme").set(themeSettings);
            await db.collection("settings").doc("form").set({ questions: questionsData });
            alert("✅ บันทึกโครงสร้างฟอร์มสำเร็จ!"); 
        } catch (error) {
            console.error(error);
            alert("❌ บันทึกไม่สำเร็จ: " + error.message + "\n\n(เช็คให้ชัวร์ว่าแก้ Rules Firestore แล้ว)");
        }
        btn.disabled = false; btn.innerHTML = "💾 บันทึกโครงสร้างฟอร์ม";
    }

    // ส่งใบสมัคร (ฝั่งผู้ใช้)
    async function submitForm() {
        const inputs = document.getElementById('form-content').querySelectorAll('input, select');
        for(let input of inputs) { if(!input.checkValidity()) { input.reportValidity(); return; } }

        const btn = event.target; btn.disabled = true; btn.innerHTML = "กำลังส่งข้อมูล... ⏳";
        
        try {
            let ans = {};
            for(let q of questionsData) {
                if(q.type === 'section') continue;
                const el = document.querySelector(`[name="${q.id}"]`);
                if(q.type === 'file' && el.files[0]) {
                    btn.innerHTML = "กำลังอัปโหลดรูปภาพ... 🖼️";
                    const ref = storage.ref(`submissions/${Date.now()}_${el.files[0].name}`);
                    await ref.put(el.files[0]);
                    ans[q.id] = await ref.getDownloadURL();
                } else { 
                    ans[q.id] = el ? el.value : ""; 
                }
            }
            
            btn.innerHTML = "กำลังบันทึกเข้าฐานข้อมูล... 💾";
            await db.collection("submissions").add({ timestamp: new Date().toLocaleString('th-TH'), answers: ans });
            
            alert("🎉 ส่งใบสมัครเรียบร้อยแล้ว!"); 
            location.reload();
        } catch (error) {
            console.error(error);
            alert("❌ เกิดข้อผิดพลาดตอนส่งข้อมูล: " + error.message + "\n\n(เช็คให้ชัวร์ว่าแก้ Rules Storage แล้ว)");
            btn.disabled = false; btn.innerHTML = "ส่งใบสมัคร 💾";
        }
    }

    function renderStatsView(mode) {
        const area = document.getElementById('statsContentArea');
        if(submissions.length === 0) { area.innerHTML = "ยังไม่มีข้อมูลผู้สมัคร"; return; }

        if(mode === 'summary') {
            area.innerHTML = `<h3>จำนวนผู้สมัครทั้งหมด: <span style="color:var(--primary-color)">${submissions.length}</span> คน</h3>`;
            const table = document.createElement('table');
            table.innerHTML = `<tr style="background:#f4f4f4;"><th>ลำดับ</th><th>เวลาที่ส่ง</th><th>จัดการ</th></tr>`;
            submissions.forEach((s, i) => {
                table.innerHTML += `<tr><td>คนที่ ${submissions.length - i}</td><td>${s.timestamp}</td><td><button onclick="showIndividualData(${i})" style="cursor:pointer; padding:5px 10px;">ดูข้อมูล</button></td></tr>`;
            });
            area.appendChild(table);
        }
    }

    function showIndividualData(i) {
        let s = submissions[i];
        let html = `<h4>ข้อมูลผู้สมัครคนที่ ${submissions.length - i}</h4><hr>`;
        questionsData.forEach(q => {
            if(q.type==='section') return;
            let val = s.answers[q.id] || "-";
            if(val.includes('firebasestorage')) {
                html += `<p><strong>${q.label}:</strong><br><img src="${val}" style="max-width:200px; border-radius:8px; margin-top:5px;"><br><a href="${val}" target="_blank" style="font-size:12px;">🔗 เปิดดูรูปเต็ม</a></p>`;
            } else {
                html += `<p><strong>${q.label}:</strong> <span style="color:#2980b9;">${val}</span></p>`;
            }
        });
        html += `<hr><button onclick="deleteSubmission(${i})" style="background:red; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%;">🗑️ ลบใบสมัครนี้</button>`;
        document.getElementById('statsContentArea').innerHTML = html;
    }

    async function deleteSubmission(i) {
        if(confirm('ลบข้อมูลนี้ถาวร ใช่หรือไม่?')) {
            try {
                await db.collection('submissions').doc(submissions[i].id).delete();
                alert('ลบเรียบร้อย!'); switchTab('tab-stats');
            } catch(e) { alert("ลบไม่สำเร็จ: " + e.message); }
        }
    }

    // เรียกโหลดระบบ
    loadInitialData();
</script>
</body>
</html>
