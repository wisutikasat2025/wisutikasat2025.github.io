<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พิมพ์ใบสมัคร - การประกวด</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* 🌟 โซนดูบนหน้าจอปกติ */
        body { 
            background: #525659; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
            font-family: 'Prompt', sans-serif; 
            margin: 0;
        }
        
        .a4-paper { 
            background: white; 
            width: 210mm; /* บังคับกว้างเท่า A4 */
            min-height: 297mm; /* บังคับสูงเท่า A4 */
            padding: 15mm; 
            box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            color: #000;
        }
        
        .print-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 3px double #333; }
        .print-title { font-size: 24px; font-weight: 600; margin-bottom: 15px; }
        .print-appid-box { display: inline-block; border: 2px solid #000; padding: 10px 25px; font-size: 20px; font-weight: bold; margin-bottom: 10px; border-radius: 8px; }
        
        .print-table { width: 100%; border-collapse: collapse; font-size: 16px; margin-bottom: 30px; table-layout: fixed; } /* บังคับตารางไม่ให้หด */
        .print-table th, .print-table td { border: 1px solid #000; padding: 12px; text-align: left; vertical-align: middle; word-wrap: break-word; }
        .print-table th { background-color: #f0f0f0; }
        
        .col-header { width: 35%; font-weight: bold; } /* ล็อกความกว้างคอลัมน์คำถาม */
        .col-answer { width: 65%; } /* ล็อกความกว้างคอลัมน์คำตอบ */

        .print-img { max-height: 200px; max-width: 100%; border-radius: 8px; display: block; border: 1px solid #ccc; margin: 0 auto; }
        
        .print-signature { text-align: right; margin-top: 60px; font-size: 18px; margin-right: 20px; }
        
        #loadingMsg { color: white; font-size: 24px; text-align: center; margin-top: 50px; }

        /* ========================================= */
        /* 🖨️ โซนสำหรับการสั่ง Print (มือถือ & คอม) */
        /* ========================================= */
        @media print {
            body { 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            
            /* 🌟 หัวใจสำคัญ: บังคับหน้ากระดาษ A4 ไม่ให้มือถือย่อสเกลเพี้ยน */
            .a4-paper { 
                width: 100% !important; 
                max-width: 100% !important;
                min-height: auto !important; 
                padding: 0 !important; 
                box-shadow: none !important; 
                border: none !important; 
                margin: 0 !important;
            }
            
            @page { 
                size: A4 portrait; 
                margin: 10mm; /* ขอบกระดาษตอนปริ้นท์ */
            }
            
            /* ป้องกันการขาดครึ่งหน้า */
            tr { page-break-inside: avoid; } 
            img { page-break-inside: avoid; max-width: 200px !important; }
            .print-signature { page-break-inside: avoid; }
            
            /* รักษาตารางและขนาดอักษรตอนปริ้นท์ */
            .print-table { width: 100% !important; font-size: 14px !important; }
            .print-title { font-size: 22px !important; }
            .print-appid-box { font-size: 18px !important; padding: 8px 20px !important; }
            .print-table th { background-color: #f0f0f0 !important; }
        }
    </style>
</head>
<body>

    <div id="loadingMsg">⏳ กำลังดึงข้อมูลและจัดเตรียมหน้ากระดาษ...</div>

    <div class="a4-paper" id="paper" style="display: none;">
        <div class="print-header">
            <div class="print-title" id="printFormTitle">ใบสมัครประกวดหนูน้อยสงกรานต์</div>
            <div class="print-appid-box">รหัสผู้สมัคร: <span id="printAppId" style="color: #e74c3c;"></span></div>
            <div style="font-size: 14px; color: #555;">วันที่สมัคร: <span id="printTimestamp"></span></div>
        </div>
        
        <table class="print-table">
            <tbody id="printTableBody">
                </tbody>
        </table>
        
        <div class="print-signature">
            <p>ลงชื่อ.......................................................ผู้สมัคร</p>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC4VAfcbDDrDjOZVAIV3cYCcVa2F0re6j8",
        authDomain: "register-wisutikasat.firebaseapp.com",
        projectId: "register-wisutikasat",
        messagingSenderId: "572965765143",
        appId: "1:572965765143:web:534acca9ea1a54ff939c52"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadAndPrint() {
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');

        if (!appId) {
            document.getElementById('loadingMsg').innerText = "❌ ไม่พบรหัสผู้สมัครในลิงก์";
            return;
        }

        try {
            const [subDoc, themeDoc, formDoc] = await Promise.all([
                db.collection("submissions").doc(appId).get(),
                db.collection("settings").doc("theme").get(),
                db.collection("settings").doc("form").get()
            ]);

            if (!subDoc.exists) {
                document.getElementById('loadingMsg').innerText = "❌ ไม่พบข้อมูลการสมัครของรหัสนี้";
                return;
            }

            const data = subDoc.data();
            const formTitle = themeDoc.exists && themeDoc.data().formTitle ? themeDoc.data().formTitle : "ใบสมัครเข้าร่วมกิจกรรม";
            const questions = formDoc.exists ? formDoc.data().questions : [];

            document.getElementById('printFormTitle').innerHTML = formTitle;
            document.getElementById('printAppId').innerText = data.appId;
            document.getElementById('printTimestamp').innerText = data.timestamp;

            const tbody = document.getElementById('printTableBody');
            
            questions.forEach(q => {
                if (q.type === 'section') {
                    tbody.innerHTML += `<tr><td colspan="2" style="background:#e0e0e0; padding:10px; font-weight:bold; font-size:16px;">${q.label}</td></tr>`;
                    return;
                }
                
                if (q.type === 'info') {
                    tbody.innerHTML += `<tr><td colspan="2" style="background:#f9f9f9; padding:10px; font-size:13px; font-style:italic;"><strong>${q.label}</strong><br>${q.description.replace(/\n/g, '<br>')}</td></tr>`;
                    return;
                }
                
                let val = data.answers[q.id] || "-";
                let valHtml = val;

                // ตรวจจับลิงก์รูปภาพ
                if (val.includes('i.ibb.co') || val.includes('res.cloudinary.com') || val.includes('http')) {
                    valHtml = `<img src="${val}" class="print-img">`;
                }

                // 🌟 ใช้ Class บังคับความกว้างคอลัมน์ไม่ให้เพี้ยน
                tbody.innerHTML += `<tr><td class="col-header">${q.label}</td><td class="col-answer">${valHtml}</td></tr>`;
            });

            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('paper').style.display = 'block';

            const images = document.getElementsByTagName('img');
            let loadedCount = 0;

            const triggerPrint = () => {
                setTimeout(() => { window.print(); }, 800);
            };

            if (images.length === 0) {
                triggerPrint();
            } else {
                for (let img of images) {
                    if (img.complete) {
                        loadedCount++;
                        if (loadedCount === images.length) triggerPrint();
                    } else {
                        img.onload = () => { loadedCount++; if (loadedCount === images.length) triggerPrint(); };
                        img.onerror = () => { loadedCount++; if (loadedCount === images.length) triggerPrint(); };
                    }
                }
            }

        } catch (error) {
            document.getElementById('loadingMsg').innerText = "❌ ระบบขัดข้อง: " + error.message;
        }
    }

    loadAndPrint();

</script>
</body>
</html>
